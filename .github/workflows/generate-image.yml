name: Generate Image

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Image generation prompt'
        required: true
        type: string
      model:
        description: 'Gemini image model'
        required: false
        default: 'gemini-3-pro-image-preview'
        type: choice
        options:
          - gemini-3-pro-image-preview
          - gemini-2.0-flash-image-preview
      use_yasha_avatar:
        description: 'Use Yasha avatar as reference'
        required: false
        default: false
        type: boolean
      reference_image_url:
        description: 'Reference image URL (optional, ignored if use_yasha_avatar=true)'
        required: false
        type: string
      filename:
        description: 'Output filename (optional, default: generated_image.png)'
        required: false
        default: 'generated_image.png'
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install google-genai requests
      
      - name: Generate image
        env:
          GOOGLE_GEMINI_API_KEY: ${{ secrets.GOOGLE_GEMINI_API_KEY }}
          PROMPT: ${{ inputs.prompt }}
          MODEL: ${{ inputs.model }}
          USE_YASHA_AVATAR: ${{ inputs.use_yasha_avatar }}
          REFERENCE_URL: ${{ inputs.reference_image_url }}
          FILENAME: ${{ inputs.filename }}
        run: |
          OUTFILE="${FILENAME:-generated_image.png}"
          if [ "$USE_YASHA_AVATAR" == "true" ]; then
            python scripts/generate-image.py \
              --prompt "$PROMPT" \
              --model "$MODEL" \
              --output "$OUTFILE" \
              --reference assets/yasha_avatar_v3.jpg
          elif [ -n "$REFERENCE_URL" ]; then
            python scripts/generate-image.py \
              --prompt "$PROMPT" \
              --model "$MODEL" \
              --output "$OUTFILE" \
              --reference "$REFERENCE_URL"
          else
            python scripts/generate-image.py \
              --prompt "$PROMPT" \
              --model "$MODEL" \
              --output "$OUTFILE"
          fi
      
      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: generated-image
          path: ${{ inputs.filename || 'generated_image.png' }}
          retention-days: 30
      
      - name: Comment with image info
        env:
          MODEL: ${{ inputs.model }}
          FILENAME: ${{ inputs.filename }}
        run: |
          echo "✅ Image generated successfully"
          echo "🤖 Model: $MODEL"
          echo "📄 File: ${FILENAME:-generated_image.png}"
          ls -lh "${FILENAME:-generated_image.png}"
          file "${FILENAME:-generated_image.png}"
